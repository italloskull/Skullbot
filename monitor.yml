name: Online-Fix Monitor

on:
  schedule:
    # Roda a cada 10 minutos
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite a ativação manual pelo GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    # Garantimos permissão de escrita para que o bot possa commitar o "last_game.txt" de volta ao repositório
    permissions:
      contents: write

    steps:
      - name: Baixar o código (Checkout)
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar Script de Monitoramento
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Salvar o estado do último jogo (Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_game.txt
          # Se o arquivo for modificado, cria um commit e manda para a branch atual
          git diff --quiet && git diff --staged --quiet || (git commit -m "Atualiza last_game.txt" && git push)